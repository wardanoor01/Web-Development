<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Elements</title>
</head>
<body>
    <h1>Inline Elements (Most Commonly Used First)</h1>
    <a>: Anchor or hyperlink.
    <img>: Image.
    <span>: Generic inline container.
    <input>: Input Field.
    <label>: Lable for a form element.
    <strong>: Strong emphasis.
    <em>: Emphasized text.
    <br>: Line break.
    <code>: Code snippet.
    <b>: Bold text.
    <i>: Italic text.
    <u>: Underline text.
    <small>: Smaller text.
    <sub>: Subscript.
    <sup>: Superscript.
    <mark>: Marked or highlighted text.
    <q>: Short inline quotation.
    <cite>: Citation.
    <kbd>: Keyboard input.
    <samp>: Sample output.
    <var>: Variable in a mathematical expression or programming context.
    <time>: Time.
    <abbr>: Abberivation.
    <data>: Machine-readable translation of content.
    <acronym>: Acronym (Not supported in HTML5).
</body>
</html>
